<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAIZZ STORE</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d1117;
color:white;
}

header{
background:#111827;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
color:#00c8ff;
}

.banner{
margin:20px;
padding:40px;
border-radius:15px;
text-align:center;
background:linear-gradient(135deg,#00c8ff,#0044ff);
}

.banner h1{
font-size:32px;
margin-bottom:10px;
}

.games{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:#161b22;
padding:20px;
border-radius:12px;
text-align:center;
}

button{
margin-top:10px;
padding:10px 18px;
border:none;
border-radius:8px;
background:#00c8ff;
color:white;
font-weight:bold;
cursor:pointer;
}

footer{
margin-top:30px;
padding:20px;
text-align:center;
background:#111827;
}
</style>

</head>

<body>

<header>
<div class="logo">FAIZZ STORE</div>
</header>

<div class="banner">
<h1>TOP UP GAME CEPAT & AMAN</h1>
<p>24 Jam • Harga Murah • Proses Otomatis</p>
</div>

<section class="games">
<h2>🎮 Pilih Game</h2>

<div class="grid">

<div class="card">
<h3>Mobile Legends</h3>
<button>Top Up</button>
</div>

<div class="card">
<h3>Free Fire</h3>
<button>Top Up</button>
</div>

<div class="card">
<h3>PUBG Mobile</h3>
<button>Top Up</button>
</div>

<div class="card">
<h3>Honor of Kings</h3>
<button>Top Up</button>
</div>

<div class="card">
<h3>Valorant</h3>
<button>Top Up</button>
</div>

<div class="card">
<h3>Genshin Impact</h3>
<button>Top Up</button>
</div>

</div>

</section>

<footer>
© 2026 FAIZZ STORE
</footer>

</body>
</html>
